<!DOCTYPE html>
<html>
<head>
  <title>City of Syndicates</title>
</head>
<body>
  <h1>City of Syndicates</h1>

  <input id="user" placeholder="Username">
  <input id="pass" placeholder="Password" type="password">

  <br><br>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <button onclick="getStats()">Stats</button>
  <button onclick="crime()">Commit Crime</button>
  <button onclick="rest()">Rest</button>
  <button onclick="leaderboard()">Leaderboard</button>

  <pre id="output"></pre>

<script>
const API = "https://city-of-syndicates.onrender.com";

function data() {
  return {
    username: user.value,
    password: pass.value
  };
}

async function register() {
  const r = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data())
  });
  output.textContent = await r.text();
}

async function login() {
  const r = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data())
  });
  output.textContent = await r.text();
}

async function getStats() {
  const r = await fetch(API + "/stats/" + user.value);
  output.textContent = await r.text();
}

async function crime() {
  const r = await fetch(API + "/crime", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username: user.value})
  });
  output.textContent = await r.text();
}

async function rest() {
  const r = await fetch(API + "/rest", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username: user.value})
  });
  output.textContent = await r.text();
}

async function leaderboard() {
  const r = await fetch(API + "/leaderboard");
  output.textContent = await r.text();
}
</script>

</body>
</html>
